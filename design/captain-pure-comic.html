document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"d1675fac-d20c-46e9-b2e2-652d01511725\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"9eb15e1a-9708-46af-a5b7-1b790d0c58a0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{--ink:#11294a;--blue:#1B52A8;--sky:#bfe0ff;}\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html,body{height:100%;}\n  body{background:#0c1830;overflow:hidden;font-family:\"Nunito\",sans-serif;}\n\n  .reader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;\n    background:radial-gradient(120% 120% at 50% 0%,#16294a,#0a1326 70%);}\n  .scaler{transform-origin:center center;}\n  .page-stack{width:900px;height:1240px;position:relative;}\n\n  .page{position:absolute;inset:0;display:none;background:#ffffff;border-radius:6px;\n    overflow:hidden;box-shadow:0 30px 80px -30px rgba(0,0,0,.8);}\n  .page.active{display:block;animation:pageIn .55s cubic-bezier(.3,.7,.3,1) both;}\n  .page::before{content:\"\";position:absolute;top:0;left:0;width:34px;height:100%;\n    background:linear-gradient(90deg,rgba(0,0,0,.16),transparent);z-index:60;pointer-events:none;}\n  @keyframes pageIn{from{opacity:0;transform:perspective(1600px) rotateY(-22deg) translateX(60px);}\n    to{opacity:1;transform:none;}}\n\n  /* panels */\n  .panel{position:absolute;border:6px solid var(--ink);border-radius:12px;overflow:hidden;\n    background:#dff0ff;box-shadow:4px 5px 0 rgba(17,41,74,.18);}\n  .scene{position:absolute;inset:0;}\n  .ch{position:absolute;}\n  .ch svg{display:block;width:100%;height:auto;}\n\n  /* speech + caption */\n  .bubble{position:absolute;background:#fff;border:4px solid var(--ink);border-radius:22px;\n    padding:11px 16px;font-family:\"Fredoka\",sans-serif;font-weight:600;color:var(--ink);\n    font-size:20px;line-height:1.18;width:max-content;max-width:300px;z-index:30;box-shadow:2px 3px 0 rgba(17,41,74,.18);}\n  .bubble.sm{font-size:17px;padding:8px 13px;}\n  .bubble::after{content:\"\";position:absolute;width:0;height:0;}\n  .bubble.dl::after{left:26px;bottom:-22px;border:11px solid transparent;border-top-color:var(--ink);}\n  .bubble.dl::before{content:\"\";position:absolute;left:30px;bottom:-13px;width:0;height:0;border:8px solid transparent;border-top-color:#fff;z-index:1;}\n  .bubble.dr::after{right:26px;bottom:-22px;border:11px solid transparent;border-top-color:var(--ink);}\n  .bubble.dr::before{content:\"\";position:absolute;right:30px;bottom:-13px;width:0;height:0;border:8px solid transparent;border-top-color:#fff;z-index:1;}\n  .bubble.bad{background:#26310f;border-color:#0e1505;color:#cfe0a0;}\n  .bubble.bad.dl::before{border-top-color:#26310f;}\n  .bubble.bad.dr::before{border-top-color:#26310f;}\n\n  .cap{position:absolute;background:#fff3cf;border:3px solid var(--ink);border-radius:6px;\n    padding:10px 14px;font-family:\"Fredoka\",sans-serif;font-weight:600;color:var(--ink);\n    font-size:19px;line-height:1.2;z-index:30;box-shadow:3px 3px 0 rgba(17,41,74,.15);max-width:520px;}\n\n  /* SFX + bursts */\n  .sfx{position:absolute;font-family:\"Bangers\",cursive;color:#fff;\n    -webkit-text-stroke:3px var(--ink);paint-order:stroke fill;\n    font-size:80px;line-height:.9;z-index:40;letter-spacing:1px;text-shadow:4px 5px 0 rgba(17,41,74,.25);}\n  .burst{position:absolute;z-index:45;}\n\n  /* title text */\n  .ctitle{position:absolute;font-family:\"Bangers\",cursive;text-align:center;width:100%;z-index:50;}\n  .logoimg{width:100%;height:auto;display:block;}\n\n  /* ---- animations ---- */\n  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}\n  @keyframes bobx{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-9px) rotate(3deg)}}\n  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-22px) rotate(4deg)}}\n  @keyframes wobble{0%,100%{transform:scale(1,1)}50%{transform:scale(1.06,.94)}}\n  @keyframes shake{0%,100%{transform:translate(0,0) rotate(0)}20%{transform:translate(-5px,3px) rotate(-2deg)}40%{transform:translate(5px,-3px) rotate(2deg)}60%{transform:translate(-4px,-2px) rotate(-1deg)}80%{transform:translate(4px,2px) rotate(1deg)}}\n  @keyframes drip{0%{transform:translateY(0) scaleY(.8);opacity:0}30%{opacity:1}100%{transform:translateY(34px) scaleY(1.2);opacity:0}}\n  @keyframes popin{0%{transform:scale(0) rotate(-25deg);opacity:0}70%{transform:scale(1.2) rotate(8deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}\n  @keyframes splashpop{0%{transform:scale(.2);opacity:0}35%{opacity:1}100%{transform:scale(1.5);opacity:0}}\n  @keyframes twinkle{0%,100%{opacity:.25;transform:scale(.7)}50%{opacity:1;transform:scale(1.15)}}\n  @keyframes rays{to{transform:rotate(360deg)}}\n  @keyframes glow{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:.95;transform:scale(1.2)}}\n  @keyframes flyin{0%{transform:translate(-120%,40%) rotate(-12deg);opacity:0}55%{opacity:1}100%{transform:translate(0,0) rotate(-10deg);opacity:1}}\n  @keyframes blink{0%,40%,100%{transform:scaleY(1)}46%,54%{transform:scaleY(.1)}}\n  @keyframes confetti{0%{transform:translateY(-20px) rotate(0);opacity:0}10%{opacity:1}100%{transform:translateY(380px) rotate(420deg);opacity:0}}\n  @keyframes swirl{to{transform:rotate(-360deg)}}\n\n  .a-bob{animation:bob 3s ease-in-out infinite;}\n  .a-bobx{animation:bobx 3.4s ease-in-out infinite;}\n  .a-float{animation:floaty 4s ease-in-out infinite;}\n  .a-wob{animation:wobble 1.4s ease-in-out infinite;transform-origin:50% 100%;}\n  .a-shake{animation:shake .35s linear infinite;}\n  .a-twinkle{animation:twinkle 2s ease-in-out infinite;}\n  .a-rays{animation:rays 40s linear infinite;transform-origin:center;}\n  .a-swirl{animation:swirl 3.5s linear infinite;transform-origin:center;}\n  .a-glow{animation:glow 1.8s ease-in-out infinite;}\n  .page.active .a-flyin{animation:flyin 1s cubic-bezier(.2,.6,.3,1) .15s both;}\n  .page.active .a-pop{animation:popin .6s cubic-bezier(.2,1.4,.4,1) both;}\n  .page.active .a-pop-late{animation:popin .5s cubic-bezier(.2,1.6,.4,1) .85s both;}\n  .page.active .a-splash{animation:splashpop 1s ease-out 1s infinite;}\n  .a-blink{animation:blink 3s ease-in-out infinite;transform-origin:center;}\n\n  .drip{transform-origin:top;animation:drip 1.8s ease-in infinite;}\n\n  /* nav */\n  .nav{position:fixed;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;\n    background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;\n    z-index:200;box-shadow:0 6px 18px rgba(0,0,0,.35);transition:transform .15s,background .15s;}\n  .nav:hover{transform:translateY(-50%) scale(1.08);background:#fff;}\n  .nav:disabled{opacity:.3;cursor:default;}\n  .nav svg{width:24px;height:24px;fill:none;stroke:#11294a;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}\n  .nav.prev{left:18px;} .nav.next{right:18px;}\n  .bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:200;\n    display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.94);\n    padding:8px 16px;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,.3);}\n  .bar .t{font-family:\"Fredoka\";font-weight:600;font-size:13px;color:#11294a;letter-spacing:.02em;}\n  .bar .dots{display:flex;gap:6px;}\n  .dot{width:9px;height:9px;border-radius:50%;background:#c3d2e6;cursor:pointer;border:none;padding:0;}\n  .dot.on{background:#1B52A8;transform:scale(1.2);}\n  .hint{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;color:#9fb4d6;\n    font-family:\"Fredoka\";font-size:12px;letter-spacing:.18em;text-transform:uppercase;}\n  .zone{position:fixed;top:0;height:100%;width:22%;z-index:150;cursor:pointer;}\n  .zone.l{left:0;} .zone.r{right:0;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"hint\">Captain Pure · Episode 1<\u002Fdiv>\n  \n  <div class=\"reader\">\n    <button class=\"nav prev\" id=\"prev\" aria-label=\"Previous\"><svg viewBox=\"0 0 24 24\"><polyline points=\"15 5 8 12 15 19\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n    <div class=\"scaler\" id=\"scaler\">\n      <div class=\"page-stack\" id=\"stack\"><\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"nav next\" id=\"next\" aria-label=\"Next\"><svg viewBox=\"0 0 24 24\"><polyline points=\"9 5 16 12 9 19\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"zone l\" id=\"zl\"><\u002Fdiv>\n  <div class=\"zone r\" id=\"zr\"><\u002Fdiv>\n  <div class=\"bar\">\n    <span class=\"t\" id=\"ptitle\">Cover<\u002Fspan>\n    <div class=\"dots\" id=\"dots\"><\u002Fdiv>\n    <span class=\"t\" id=\"pnum\">1 / 8<\u002Fspan>\n  <\u002Fdiv>\n\n<script src=\"fdf0ced6-6711-4fb1-b70c-87ddfd246f3a\"><\u002Fscript>\n<script src=\"97118c86-a9cb-41f9-a637-b10450ae27a1\"><\u002Fscript>\n<script src=\"6fb9e9e0-5aec-467d-9e8f-a97da8f06a46\"><\u002Fscript>\n<script>\n/* ---------------- engine ---------------- */\nconst stack=document.getElementById('stack');\nconst PAGES=window.COMIC_PAGES;\nstack.innerHTML = PAGES.map((p,i)=>`<div class=\"page\" data-screen-label=\"Comic page ${i}\">${p.html}<\u002Fdiv>`).join('');\nconst pageEls=[...stack.querySelectorAll('.page')];\n\nconst dotsEl=document.getElementById('dots');\ndotsEl.innerHTML=PAGES.map((p,i)=>`<button class=\"dot\" data-i=\"${i}\" aria-label=\"Page ${i+1}\"><\u002Fbutton>`).join('');\nconst dotEls=[...dotsEl.querySelectorAll('.dot')];\n\nlet idx=parseInt(localStorage.getItem('capPureComicPage')||'0',10);\nif(isNaN(idx)||idx<0||idx>=PAGES.length)idx=0;\n\nfunction render(){\n  pageEls.forEach((el,i)=>el.classList.toggle('active',i===idx));\n  dotEls.forEach((d,i)=>d.classList.toggle('on',i===idx));\n  document.getElementById('pnum').textContent=(idx+1)+' / '+PAGES.length;\n  document.getElementById('ptitle').textContent=PAGES[idx].title;\n  document.getElementById('prev').disabled=idx===0;\n  document.getElementById('next').disabled=idx===PAGES.length-1;\n  localStorage.setItem('capPureComicPage',idx);\n}\nfunction go(n){const v=Math.max(0,Math.min(PAGES.length-1,n));if(v!==idx){idx=v;render();}}\ndocument.getElementById('prev').onclick=()=>go(idx-1);\ndocument.getElementById('next').onclick=()=>go(idx+1);\ndocument.getElementById('zl').onclick=()=>go(idx-1);\ndocument.getElementById('zr').onclick=()=>go(idx+1);\ndotEls.forEach(d=>d.onclick=()=>go(+d.dataset.i));\nwindow.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(idx+1);if(e.key==='ArrowLeft')go(idx-1);});\n\n/* scaling */\nfunction fit(){\n  const vw=window.innerWidth, vh=window.innerHeight;\n  const s=Math.min((vw-120)/900,(vh-80)/1240);\n  document.getElementById('scaler').style.transform='scale('+s+')';\n}\nwindow.addEventListener('resize',fit);\nfit();render();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
